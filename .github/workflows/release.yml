---
name: Release

"on":
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish package and GitHub release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - uses: DeterminateSystems/nix-installer-action@v22

      - name: Initialize Nix dev shell
        run: nix develop -c true

      - name: Validate tag matches package version
        id: version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(
            sed -n 's/^  @version "\(.*\)"/\1/p' mix.exs | head -n 1
          )"

          if [ -z "${package_version}" ]; then
            echo "Failed to read version from mix.exs"
            exit 1
          fi

          if [ "${tag_version}" != "${package_version}" ]; then
            echo \
              "Tag ${GITHUB_REF_NAME} does not match mix.exs ${package_version}"
            exit 1
          fi

          echo "package_version=${package_version}" >> "$GITHUB_OUTPUT"

      - name: Check whether package version already exists on Hex.pm
        id: hex
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.package_version }}
        run: |
          hex_release_url="https://hex.pm/api/packages/inngest/releases/${PACKAGE_VERSION}"
          status="$(
            curl -fsS \
              -o /tmp/inngest-hex-release.json \
              -w '%{http_code}' \
              "${hex_release_url}" || true
          )"

          if [ "${status}" = "200" ]; then
            echo "skip_publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${status}" = "404" ]; then
            echo "skip_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Unexpected Hex.pm response for ${PACKAGE_VERSION}: ${status}"
          exit 1

      - name: Publish package to Hex.pm
        if: steps.hex.outputs.skip_publish != 'true'
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: |
          nix develop -c mix local.hex --force
          nix develop -c mix deps.get
          nix develop -c mix hex.publish --yes

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        id: release-notes
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body: ${{ steps.release-notes.outputs.content }}
