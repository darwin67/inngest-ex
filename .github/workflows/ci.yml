name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  MIX_ENV: test

permissions:
  pull-requests: read
  statuses: write

jobs:
  test:
    name: Unit Test (Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # https://hexdocs.pm/elixir/compatibility-and-deprecations.html#compatibility-between-elixir-and-erlang-otp
          - elixir: "1.17"
            otp: "27.3"
          - elixir: "1.18"
            otp: "27.3"
          - elixir: "1.19"
            otp: "28.0"
          - elixir: "1.20"
            otp: "28.0"

    steps:
      - uses: actions/checkout@v3

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}

      - name: Dependency cache
        uses: actions/cache@v3
        with:
          path: |
            deps
            # _build
          key: mix-test-${{ runner.os }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            mix-test-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('**/mix.lock') }}
            mix-test-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-
            mix-test-

      - name: Install dependencies
        run: make deps

      - name: Build
        run: make build

      - name: Run unit tests with coverage
        run: UNIT=true mix coveralls.json
        env:
          MIX_ENV: test
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v3
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  e2e:
    name: E2E Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: DeterminateSystems/nix-installer-action@v22

      - name: Initialize Nix dev shell
        run: nix develop -c true

      - name: Dependency cache
        uses: actions/cache@v3
        with:
          path: |
            deps
            _build
            .nix
          key: mix-e2e-${{ runner.os }}-${{ hashFiles('**/mix.lock', 'flake.lock') }}
          restore-keys: |
            mix-e2e-${{ runner.os }}-${{ hashFiles('**/mix.lock', 'flake.lock') }}
            mix-e2e-${{ runner.os }}-
            mix-e2e-

      - name: Install dependencies
        run: nix develop -c make deps

      - name: Build
        run: nix develop -c make build

      - name: Run e2e tests
        run: nix develop -c make test-e2e

  formatter:
    name: Formatter
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: 28.0
          elixir-version: 1.20

      - name: Dependency cache
        uses: actions/cache@v3
        with:
          path: |
            deps
            _build
          key: mix-fmt-${{ runner.os }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            mix-fmt-${{ runner.os }}-${{ hashFiles('**/mix.lock') }}
            mix-fmt-${{ runner.os }}-
            mix-fmt-

      - name: Install dependencies
        run: make deps

      - name: Run Formatter
        run: make fmt

  linter:
    name: Linter
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: 28.0
          elixir-version: 1.20

      - name: Dependency cache
        uses: actions/cache@v3
        with:
          path: |
            deps
            _build
          key: mix-lint-${{ runner.os }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            mix-lint-${{ runner.os }}-${{ hashFiles('**/mix.lock') }}
            mix-lint-${{ runner.os }}-
            mix-lint-

      - name: Install dependencies
        run: make deps

      - name: Run Linter
        run: make lint

  dialyzer:
    name: Dialyzer
    runs-on: ubuntu-latest
    env:
      MIX_ENV: dev

    steps:
      - uses: actions/checkout@v3

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: 28.0
          elixir-version: 1.20

      - name: Dependency cache
        uses: actions/cache@v3
        with:
          path: |
            deps
            _build
          key: mix-dialyzer-${{ runner.os }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            mix-dialyzer-${{ runner.os }}-${{ hashFiles('**/mix.lock') }}
            mix-dialyzer-${{ runner.os }}-
            mix-dialyzer-

      - name: Install dependencies
        run: make deps

      - name: Run Dialyzer
        run: make dialyzer
