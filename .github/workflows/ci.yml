name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  MIX_ENV: test

permissions:
  pull-requests: read
  statuses: write

jobs:
  test:
    name: Unit Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: DeterminateSystems/nix-installer-action@v22

      - name: Initialize Nix dev shell
        run: nix develop -c true

      - name: Dependency cache
        uses: actions/cache@v3
        with:
          path: |
            deps
            _build
          key: mix-test-${{ runner.os }}-${{ hashFiles('**/mix.lock', 'flake.lock') }}
          restore-keys: |
            mix-test-${{ runner.os }}-${{ hashFiles('**/mix.lock', 'flake.lock') }}
            mix-test-${{ runner.os }}-
            mix-test-

      - name: Install dependencies
        run: nix develop -c make deps

      - name: Build
        run: nix develop -c make build

      - name: Run unit tests
        run: nix develop -c make unit-test

  e2e:
    name: E2E Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: DeterminateSystems/nix-installer-action@v22

      - name: Initialize Nix dev shell
        run: nix develop -c true

      - name: Dependency cache
        uses: actions/cache@v3
        with:
          path: |
            deps
            _build
            .nix
          key: mix-e2e-${{ runner.os }}-${{ hashFiles('**/mix.lock', 'flake.lock') }}
          restore-keys: |
            mix-e2e-${{ runner.os }}-${{ hashFiles('**/mix.lock', 'flake.lock') }}
            mix-e2e-${{ runner.os }}-
            mix-e2e-

      - name: Install dependencies
        run: nix develop -c make deps

      - name: Build
        run: nix develop -c make build

      - name: Run e2e tests
        run: nix develop -c make test-e2e

  formatter:
    name: Formatter
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: DeterminateSystems/nix-installer-action@v22

      - name: Initialize Nix dev shell
        run: nix develop -c true

      - name: Dependency cache
        uses: actions/cache@v3
        with:
          path: |
            deps
            _build
          key: mix-fmt-${{ runner.os }}-${{ hashFiles('**/mix.lock', 'flake.lock') }}
          restore-keys: |
            mix-fmt-${{ runner.os }}-${{ hashFiles('**/mix.lock', 'flake.lock') }}
            mix-fmt-${{ runner.os }}-
            mix-fmt-

      - name: Install dependencies
        run: nix develop -c make deps

      - name: Run Formatter
        run: nix develop -c make fmt

  linter:
    name: Linter
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: DeterminateSystems/nix-installer-action@v22

      - name: Initialize Nix dev shell
        run: nix develop -c true

      - name: Dependency cache
        uses: actions/cache@v3
        with:
          path: |
            deps
            _build
          key: mix-lint-${{ runner.os }}-${{ hashFiles('**/mix.lock', 'flake.lock') }}
          restore-keys: |
            mix-lint-${{ runner.os }}-${{ hashFiles('**/mix.lock', 'flake.lock') }}
            mix-lint-${{ runner.os }}-
            mix-lint-

      - name: Install dependencies
        run: nix develop -c make deps

      - name: Run Linter
        run: nix develop -c make lint

  dialyzer:
    name: Dialyzer
    runs-on: ubuntu-latest
    env:
      MIX_ENV: dev

    steps:
      - uses: actions/checkout@v3

      - uses: DeterminateSystems/nix-installer-action@v22

      - name: Initialize Nix dev shell
        run: nix develop -c true

      - name: Dependency cache
        uses: actions/cache@v3
        with:
          path: |
            deps
            _build
          key: mix-dialyzer-${{ runner.os }}-${{ hashFiles('**/mix.lock', 'flake.lock') }}
          restore-keys: |
            mix-dialyzer-${{ runner.os }}-${{ hashFiles('**/mix.lock', 'flake.lock') }}
            mix-dialyzer-${{ runner.os }}-
            mix-dialyzer-

      - name: Install dependencies
        run: nix develop -c make deps

      - name: Run Dialyzer
        run: nix develop -c make dialyzer
